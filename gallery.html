<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YAKALDER — Galeri</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --c-dark:#1a1a2e;--c-light:#f8f6f2;--c-blue:#6BA3C8;
  --c-green:#8BBF5A;--c-teal:#5BB8CC;--c-orange:#E8973A;
  --c-muted:#6b6b7b;--c-text:#2d2d3a;
  --font-display:'Playfair Display',serif;
  --font-body:'DM Sans',sans-serif;
  --font-mono:'Space Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:var(--font-body);background:var(--c-light);color:var(--c-text);}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:1000;background:rgba(248,246,242,0.96);backdrop-filter:blur(12px);border-bottom:1px solid rgba(0,0,0,0.08);box-shadow:0 2px 16px rgba(0,0,0,0.06);}
.nav-inner{max-width:1280px;margin:0 auto;padding:0 2rem;height:68px;display:flex;align-items:center;justify-content:space-between;}
.nav-logo{display:flex;align-items:center;gap:12px;text-decoration:none;}
.nav-logo img{height:44px;width:44px;object-fit:contain;}
.nav-logo-name{font-family:var(--font-mono);font-weight:700;font-size:.9rem;color:var(--c-dark);letter-spacing:.1em;display:block;}
.nav-logo-sub{font-size:.62rem;color:var(--c-muted);display:block;}
.nav-title{font-family:var(--font-mono);font-size:.68rem;letter-spacing:.18em;text-transform:uppercase;color:var(--c-blue);}
.nav-back{display:inline-flex;align-items:center;gap:.4rem;font-size:.8rem;font-weight:500;color:var(--c-muted);text-decoration:none;transition:color .2s;}
.nav-back:hover{color:var(--c-blue);}

/* HERO */
.hero{margin-top:68px;background:var(--c-dark);padding:4.5rem 0 3.5rem;text-align:center;position:relative;overflow:hidden;}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 20% 50%,rgba(107,163,200,.15) 0%,transparent 60%),radial-gradient(ellipse at 80% 30%,rgba(91,184,204,.1) 0%,transparent 50%);}
.hero h1{font-family:var(--font-display);font-size:clamp(2rem,4vw,3.2rem);color:white;position:relative;z-index:1;margin-bottom:.5rem;}
.hero h1 em{color:var(--c-teal);font-style:italic;}
.hero p{font-size:.9rem;color:rgba(255,255,255,.55);position:relative;z-index:1;}

/* STATS */
.stats-bar{background:#111120;display:flex;justify-content:center;border-bottom:1px solid rgba(255,255,255,.05);}
.stat-pill{padding:.9rem 2.5rem;border-right:1px solid rgba(255,255,255,.06);text-align:center;}
.stat-pill:last-child{border-right:none;}
.stat-pill .num{font-family:var(--font-mono);font-size:1.4rem;font-weight:700;color:var(--c-teal);display:block;}
.stat-pill .lbl{font-size:.7rem;color:rgba(255,255,255,.4);}

/* TOOLBAR */
.toolbar{max-width:1280px;margin:2.5rem auto 0;padding:0 2rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap;}
.filter-tabs{display:flex;gap:.4rem;flex-wrap:wrap;}
.tab-btn{padding:.4rem 1.1rem;border:1.5px solid rgba(0,0,0,.11);background:white;border-radius:20px;font-size:.76rem;font-weight:500;cursor:pointer;transition:all .2s;color:var(--c-muted);font-family:var(--font-body);}
.tab-btn:hover{border-color:var(--c-blue);color:var(--c-blue);}
.tab-btn.active{background:var(--c-dark);border-color:var(--c-dark);color:white;}
.view-btns{display:flex;gap:.3rem;}
.view-btn{width:34px;height:34px;border:1.5px solid rgba(0,0,0,.1);background:white;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1rem;transition:all .2s;}
.view-btn.active{background:var(--c-dark);border-color:var(--c-dark);color:white;}

/* GALLERY */
.gallery-section{max-width:1280px;margin:2rem auto 5rem;padding:0 2rem;}
.cat-section{margin-bottom:3.5rem;}
.cat-header{display:flex;align-items:center;gap:1rem;margin-bottom:1.5rem;padding-bottom:.7rem;border-bottom:2px solid rgba(0,0,0,.06);}
.cat-label{font-family:var(--font-mono);font-size:.67rem;letter-spacing:.2em;text-transform:uppercase;color:var(--c-blue);}
.cat-count{font-size:.73rem;color:var(--c-muted);background:rgba(0,0,0,.05);padding:.15rem .6rem;border-radius:12px;}

/* GRID */
.img-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:1rem;}
.img-card{background:white;border-radius:10px;overflow:hidden;border:1px solid rgba(0,0,0,.06);cursor:pointer;transition:all .25s;}
.img-card:hover{transform:translateY(-3px);box-shadow:0 12px 36px rgba(0,0,0,.1);}
.img-wrap{aspect-ratio:4/3;overflow:hidden;background:#e8e4dc;position:relative;}
.img-wrap img{width:100%;height:100%;object-fit:cover;transition:transform .4s;}
.img-card:hover .img-wrap img{transform:scale(1.06);}
.img-overlay{position:absolute;inset:0;background:rgba(26,26,46,.45);opacity:0;transition:opacity .25s;display:flex;align-items:center;justify-content:center;color:white;font-size:1.8rem;}
.img-card:hover .img-overlay{opacity:1;}
.img-meta{padding:.7rem 1rem;}
.img-meta .name{font-size:.78rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.img-meta .path{font-size:.63rem;color:var(--c-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:.1rem;}

/* MASONRY */
.img-masonry{columns:4;column-gap:1rem;}
@media(max-width:1000px){.img-masonry{columns:3;}}
@media(max-width:700px){.img-masonry{columns:2;}}
.masonry-item{break-inside:avoid;margin-bottom:1rem;background:white;border-radius:10px;overflow:hidden;border:1px solid rgba(0,0,0,.06);cursor:pointer;transition:all .25s;}
.masonry-item:hover{transform:translateY(-2px);box-shadow:0 12px 36px rgba(0,0,0,.1);}
.masonry-item img{width:100%;display:block;transition:transform .4s;}
.masonry-item:hover img{transform:scale(1.03);}
.masonry-item .img-meta{padding:.6rem .9rem;}

/* LIST */
.img-list{display:flex;flex-direction:column;gap:.5rem;}
.list-item{display:flex;align-items:center;gap:1rem;background:white;border-radius:8px;padding:.75rem;border:1px solid rgba(0,0,0,.06);cursor:pointer;transition:all .2s;}
.list-item:hover{box-shadow:0 4px 16px rgba(0,0,0,.06);transform:translateX(3px);}
.list-thumb{width:80px;height:56px;border-radius:6px;object-fit:cover;flex-shrink:0;background:#e8e4dc;}
.list-info{flex:1;min-width:0;}
.list-name{font-size:.85rem;font-weight:500;}
.list-url{font-size:.71rem;color:var(--c-muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.list-open{font-size:.73rem;color:var(--c-blue);font-weight:500;padding:.3rem .8rem;border:1px solid var(--c-blue);border-radius:6px;text-decoration:none;flex-shrink:0;transition:all .2s;}
.list-open:hover{background:var(--c-blue);color:white;}

/* LIGHTBOX */
.lightbox{position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.95);display:none;align-items:center;justify-content:center;backdrop-filter:blur(8px);}
.lightbox.open{display:flex;}
.lightbox-inner{position:relative;max-width:90vw;max-height:90vh;text-align:center;}
.lightbox-img{max-width:90vw;max-height:80vh;object-fit:contain;border-radius:8px;box-shadow:0 24px 64px rgba(0,0,0,.5);}
.lightbox-caption{color:rgba(255,255,255,.7);font-size:.85rem;margin-top:.75rem;}
.lightbox-close{position:fixed;top:1.5rem;right:2rem;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:white;border-radius:50%;width:42px;height:42px;font-size:1.3rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;z-index:10000;}
.lightbox-close:hover{background:rgba(255,255,255,.22);}
.lightbox-nav{position:fixed;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:white;border-radius:50%;width:48px;height:48px;font-size:1.4rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;z-index:10000;}
.lightbox-nav:hover{background:rgba(255,255,255,.22);}
.lightbox-prev{left:1.5rem;}
.lightbox-next{right:1.5rem;}
.lightbox-counter{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);font-family:var(--font-mono);font-size:.7rem;color:rgba(255,255,255,.45);letter-spacing:.15em;}
.lb-actions{display:flex;align-items:center;justify-content:center;gap:.75rem;margin-top:1rem;}
.lb-btn{padding:.4rem 1rem;border-radius:6px;font-size:.78rem;font-weight:500;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:.3rem;border:1px solid rgba(255,255,255,.25);color:white;background:rgba(255,255,255,.1);transition:all .2s;}
.lb-btn:hover{background:rgba(255,255,255,.22);}

footer{background:#111120;color:rgba(255,255,255,.45);padding:2rem 0;text-align:center;font-size:.78rem;}

@media(max-width:768px){
  .toolbar{flex-direction:column;align-items:stretch;}
  .filter-tabs{justify-content:center;}
  .img-grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));}
  .stat-pill{padding:.75rem 1.5rem;}
}
</style>
</head>

58844_8386367631488648_1498514050604838039_n.jpg"}, {"title": "Etkinlik 3", "url": "https://yakalder.org/wp-content/uploads/2025/03/467846242_8386367621488649_2776287047962125866_n.jpg"}, {"title": "f7a3e7d0", "url": "https://yakalder.org/wp-content/uploads/2025/03/f7a3e7d0-6cd.jpg"}, {"title": "Sunu2", "url": "https://yakalder.org/wp-content/uploads/2025/03/Sunu2.gif"}], "Konferanslar": [{"title": "IQLC 2025", "url": "https://yakalder.org/wp-content/uploads/2025/09/iqlc2025-1-scaled.png"}, {"title": "ICDAH 2025 Poster", "url": "https://yakalder.org/wp-content/uploads/2025/09/ICDAH2025-POSTER-scaled.png"}, {"title": "ICLA 2025 Poster", "url": "https://yakalder.org/wp-content/uploads/2025/09/icla2025-poster.png"}]};

const CAT_COLORS = {
  'Kişiler':     '#6BA3C8',
  'Etkinlikler': '#E8973A',
  'Konferanslar':'#5BB8CC',
};

let currentCat  = 'all';
let currentView = 'grid';
let lbImages    = [];
let lbIndex     = 0;

function getFilename(url) { return url.split('/').pop(); }

function buildStats() {
  const bar = document.getElementById('statsBar');
  let html = `<div class="stat-pill"><span class="num">26</span><span class="lbl">Toplam Görsel</span></div>`;
  for (const [cat, imgs] of Object.entries(CATS))
    html += `<div class="stat-pill"><span class="num">${imgs.length}</span><span class="lbl">${cat}</span></div>`;
  bar.innerHTML = html;
}

function filterCat(cat) {
  currentCat = cat;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  renderGallery();
}

function setView(v) {
  currentView = v;
  document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('v' + v).classList.add('active');
  renderGallery();
}

function imgCard(img, idx) {
  const name = img.title || getFilename(img.url);
  const path = getFilename(img.url);
  if (currentView === 'list') {
    return `<div class="list-item" onclick="openLightbox(${idx})">
      <img class="list-thumb" src="${img.url}" alt="${name}" loading="lazy" onerror="this.style.background='#e8e4dc';this.src=''">
      <div class="list-info"><div class="list-name">${name}</div><div class="list-url">${img.url}</div></div>
      <a class="list-open" href="${img.url}" target="_blank" onclick="event.stopPropagation()">Aç →</a>
    </div>`;
  }
  if (currentView === 'masonry') {
    return `<div class="masonry-item" onclick="openLightbox(${idx})">
      <img src="${img.url}" alt="${name}" loading="lazy" onerror="this.src='';this.style.height='120px';this.style.background='#e8e4dc'">
      <div class="img-meta"><div class="name">${name}</div><div class="path">${path}</div></div>
    </div>`;
  }
  return `<div class="img-card" onclick="openLightbox(${idx})">
    <div class="img-wrap">
      <img src="${img.url}" alt="${name}" loading="lazy" onerror="this.src='';this.style.background='#e8e4dc'">
      <div class="img-overlay">🔍</div>
    </div>
    <div class="img-meta"><div class="name">${name}</div><div class="path">${path}</div></div>
  </div>`;
}

function renderGallery() {
  const container = document.getElementById('galleryContent');
  lbImages = [];
  let html = '';
  let globalIdx = 0;

  const catsToShow = currentCat === 'all' ? Object.keys(CATS) : [currentCat];

  for (const cat of catsToShow) {
    const imgs = CATS[cat] || [];
    if (!imgs.length) continue;
    const color = CAT_COLORS[cat] || '#6b6b7b';
    const wrapClass = currentView === 'grid' ? 'img-grid' : currentView === 'masonry' ? 'img-masonry' : 'img-list';
    imgs.forEach(img => lbImages.push(img));
    html += `<div class="cat-section">
      <div class="cat-header">
        <div style="width:4px;height:20px;background:${color};border-radius:2px;"></div>
        <span class="cat-label">${cat}</span>
        <span class="cat-count">${imgs.length} görsel</span>
      </div>
      <div class="${wrapClass}">${imgs.map((img, i) => imgCard(img, globalIdx + i)).join('')}</div>
    </div>`;
    globalIdx += imgs.length;
  }
  container.innerHTML = html || '<p style="color:var(--c-muted);text-align:center;padding:3rem;">Görsel bulunamadı.</p>';
}

function openLightbox(idx) {
  lbIndex = idx;
  updateLightbox();
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function updateLightbox() {
  const img = lbImages[lbIndex];
  if (!img) return;
  const name = img.title || getFilename(img.url);
  document.getElementById('lbImg').src = img.url;
  document.getElementById('lbCaption').textContent = name;
  document.getElementById('lbOpen').href = img.url;
  document.getElementById('lbDown').href = img.url;
  document.getElementById('lbCounter').textContent = (lbIndex + 1) + ' / ' + lbImages.length;
}

function lbNav(dir) {
  lbIndex = (lbIndex + dir + lbImages.length) % lbImages.length;
  updateLightbox();
}

function closeLightbox(e) {
  if (!e || e.target === document.getElementById('lightbox') || e.target.classList.contains('lightbox-close')) {
    document.getElementById('lightbox').classList.remove('open');
    document.body.style.overflow = '';
  }
}

document.addEventListener('keydown', e => {
  if (!document.getElementById('lightbox').classList.contains('open')) return;
  if (e.key === 'ArrowRight') lbNav(1);
  if (e.key === 'ArrowLeft')  lbNav(-1);
  if (e.key === 'Escape')     closeLightbox();
});

buildStats();
renderGallery();
</script>
</body>
</html>
